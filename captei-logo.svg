<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2d1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1aab52;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7fffb2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="url(#bgGrad)"/>

  <!-- Ícone: Imã estilizado com raio -->
  <g transform="translate(22, 12)">
    <!-- Corpo do imã (U invertido) -->
    <path d="M18 70 L18 35 Q18 15 38 15 Q58 15 58 35 L58 70" 
          fill="none" stroke="url(#iconGrad)" stroke-width="10" 
          stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- Pernas do imã -->
    <rect x="8" y="65" width="20" height="12" rx="4" fill="#25D366" filter="url(#glow)"/>
    <rect x="48" y="65" width="20" height="12" rx="4" fill="#25D366" filter="url(#glow)"/>

    <!-- Polo negativo (azul/branco) -->
    <rect x="8" y="65" width="20" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
    <rect x="48" y="65" width="20" height="6" rx="3" fill="#25D366" opacity="0.6"/>

    <!-- Partículas sendo atraídas -->
    <circle cx="72" cy="30" r="4" fill="url(#dotGrad)" filter="url(#softglow)" opacity="0.9"/>
    <circle cx="80" cy="50" r="3" fill="url(#dotGrad)" filter="url(#softglow)" opacity="0.7"/>
    <circle cx="76" cy="68" r="2.5" fill="url(#dotGrad)" filter="url(#softglow)" opacity="0.5"/>

    <!-- Linhas de atração -->
    <line x1="68" y1="30" x2="58" y2="38" stroke="#25D366" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
    <line x1="76" y1="50" x2="66" y2="55" stroke="#25D366" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
    <line x1="72" y1="68" x2="62" y2="70" stroke="#25D366" stroke-width="1.5" opacity="0.3" stroke-dasharray="3,3"/>
  </g>

  <!-- Nome: Captei -->
  <text x="130" y="72" 
        font-family="'Arial Black', 'Helvetica Neue', sans-serif" 
        font-size="48" 
        font-weight="900"
        letter-spacing="-1"
        fill="#ffffff">Capt</text>
  
  <!-- "ei" em verde -->
  <text x="253" y="72" 
        font-family="'Arial Black', 'Helvetica Neue', sans-serif" 
        font-size="48" 
        font-weight="900"
        letter-spacing="-1"
        fill="#25D366"
        filter="url(#glow)">ei</text>

  <!-- Tagline -->
  <text x="131" y="92" 
        font-family="'Arial', sans-serif" 
        font-size="11" 
        font-weight="400"
        letter-spacing="3"
        fill="#25D366"
        opacity="0.7">PROSPECÇÃO INTELIGENTE</text>

  <!-- Ponto brilhante decorativo no canto -->
  <circle cx="375" cy="20" r="3" fill="#25D366" opacity="0.4" filter="url(#softglow)"/>
  <circle cx="385" cy="35" r="2" fill="#25D366" opacity="0.25"/>
  <circle cx="370" cy="38" r="1.5" fill="#25D366" opacity="0.2"/>
</svg>
